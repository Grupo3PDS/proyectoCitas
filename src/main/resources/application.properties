# Configuración de base de datos H2 con archivo (persiste datos entre reinicios)
spring.datasource.url=jdbc:h2:file:./medicronos
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2 disponible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA: update crea tablas si no existen y las actualiza si cambian
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Inicialización SQL: se ejecuta DESPUÉS de que JPA crea las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/data.sql
# Permite que INSERT duplicados no rompan el arranque
spring.sql.init.continue-on-error=true
